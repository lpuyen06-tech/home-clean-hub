<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home-Clean Hub | Sạch Nhà - Xanh Đời</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --dark-green: #1B4332;
            --eco-green: #2D6A4F;
            --accent-orange: #FF9F1C;
            --urgent-red: #e63946;
            --bg-light: #F8FAF9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-light); color: #333; line-height: 1.6; }

        /* --- Navigation --- */
        nav { 
            background: rgba(255, 255, 255, 0.98); padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { height: 45px; border-radius: 5px; }
        
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark-green); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .urgent-call-nav { color: var(--urgent-red) !important; font-weight: 800 !important; border: 1px solid var(--urgent-red); padding: 5px 10px; border-radius: 10px; }

        /* --- Hero Section --- */
        .hero { 
            background: linear-gradient(rgba(27, 67, 50, 0.8), rgba(27, 67, 50, 0.8)), 
                        url('https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            color: white; padding: 100px 5%; text-align: center;
        }
        .btn-main { 
            background: var(--accent-orange); color: white; padding: 15px 35px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            display: inline-block; transition: 0.3s; border: none; font-size: 1.1rem;
        }

        /* --- Hành trình đồ cũ --- */
        .journey { padding: 80px 5%; background: white; text-align: center; }
        .journey-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .journey-card { padding: 40px; border-radius: 20px; text-align: left; color: white; }
        .bg-recycle { background: linear-gradient(135deg, #2D6A4F, #1B4332); }
        .bg-charity { background: linear-gradient(135deg, #40916C, #2D6A4F); }

        /* --- Bảng giá --- */
        .pricing { padding: 80px 5%; text-align: center; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .price-card { background: white; padding: 30px; border-radius: 15px; border: 1px solid #eee; }

        /* --- Hotline nổi --- */
        .float-contact { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 15px; }
        .float-btn { width: 60px; height: 60px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn-phone { background: var(--urgent-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); } 100% { transform: scale(1); } }

        footer { background: var(--dark-green); color: white; padding: 50px 5%; text-align: center; }
    </style>
</head>
